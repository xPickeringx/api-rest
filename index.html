<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherAPI</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100 modern-bg">

    <div id="weather-background"></div>

    <nav class="navbar navbar-expand-lg navbar-light glass-nav mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">
                <i class="bi bi-cloud-sun-fill me-2"></i>WeatherApp
            </a>
        </div>
    </nav>

    <main class="container mb-5 flex-grow-1 d-flex align-items-center">
        <div class="row justify-content-center w-100">
            <div class="col-md-8 col-lg-6">
                
                <div class="glass-card p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold text-dark mb-0">El clima hoy</h3>
    <div>
        <input type="checkbox" class="btn-check" id="unit-toggle" autocomplete="off">
        <label class="btn btn-outline-primary btn-sm rounded-pill px-3 shadow-sm fw-medium" for="unit-toggle" id="unit-label">
            Cambiar a °F
        </label>
    </div>
</div>
                    
                    <div class="mb-4 position-relative">
    <i class="bi bi-geo-alt-fill position-absolute text-primary" style="top: 50%; left: 15px; transform: translateY(-50%); font-size: 1.2rem; z-index: 10;"></i>
    
    <select id="city-select" class="form-select form-select-lg modern-select ps-5">
        <option value="" disabled selected>Selecciona una ciudad...</option>
        
        <optgroup label="🇲🇽 México">
            <option value="Mexico City">Ciudad de México</option>
            <option value="Monterrey">Monterrey</option>
            <option value="Guadalajara">Guadalajara</option>
            <option value="Cancun">Cancún</option>
            <option value="Pachuca">Pachuca</option>
        </optgroup>

        <optgroup label="🇺🇸 Estados Unidos">
            <option value="New York">Nueva York</option>
            <option value="Los Angeles">Los Ángeles</option>
            <option value="Chicago">Chicago</option>
        </optgroup>

        <optgroup label="🇫🇷 Francia">
            <option value="Paris">París</option>
            <option value="Marseille">Marsella</option>
        </optgroup>

        <optgroup label="🇯🇵 Japón">
            <option value="Tokyo">Tokio</option>
            <option value="Osaka">Osaka</option>
        </optgroup>

        <optgroup label="🇦🇺 Australia">
            <option value="Sydney">Sídney</option>
            <option value="Melbourne">Melbourne</option>
        </optgroup>

        <optgroup label="🇪🇬 Egipto">
            <option value="Cairo">El Cairo</option>
        </optgroup>

        <optgroup label="🇧🇷 Brasil">
            <option value="Rio de Janeiro">Río de Janeiro</option>
            <option value="Sao Paulo">São Paulo</option>
        </optgroup>
    </select>
</div>

                    <div id="weather-result" class="mt-4">
                        </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="glass-footer text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0 text-muted small">Desarrollado</i> por <strong>Angello Pickering</strong> | &copy; 2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
